<html lang="en">
  <head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="index">
    <meta name="author" content="lcy">
<!--    <link rel="icon" href="../../../../favicon.ico">-->
    <title>Upload & Publish</title>
    <!-- Bootstrap core CSS -->
    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
<!--    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">-->
    <!-- Custom styles for this template -->
<!--    <link href="../static/jumbotron.css" rel="stylesheet">-->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            width: 50%;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .form-group {
            margin-bottom: 20px; /* 调整行间距 */
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
  </head>


  <body>
    <div class="container">
      <h2>刷新cookies按钮</h2>
      <button id="requestButton">点击刷新cookies</button>
      <div id="response">{{ refresh }}</div>

      <h1>文件上传示例</h1>
      <form action="/uploader/" method="POST" enctype="multipart/form-data">
          <div class="form-group">
              <label for="file">选择一个Markdown文件 (.md):</label><br>
              <input type="file" id="file" name="file" accept=".md" required>
          </div>
           <div class="form-group">
               <button type="submit">上传</button>
           </div>
      </form>

      <!-- 显示上传结果的区域 -->
      <div class="result">
          <h2>上传结果</h2>
          <pre>{{ result_dict }}</pre>
      </div>
    </div>


    <script>
        document.getElementById('requestButton').addEventListener('click', function() {
            fetch('/refresh')
                // .then(response => response.json())
                .then(data => {
                    document.getElementById('response').innerText = "刷新cookies成功!";
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('response').innerText = 'Error occurred while fetching data.';
                });
        });
    </script>



    <!-- /container -->

  </body>




</html>
